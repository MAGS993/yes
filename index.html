<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver's Wallet - PIN Test</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #667eea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .pin-container {
      background: white;
      border-radius: 24px;
      padding: 40px;
      text-align: center;
      width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .pin-container h2 { margin-bottom: 8px; color: #2d3748; }
    .pin-container p { color: #a0aec0; margin-bottom: 24px; }
    .pin-display { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; }
    .pin-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: #e2e8f0; transition: all 0.3s;
    }
    .pin-dot.filled { background: #667eea; transform: scale(1.2); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .pin-key {
      padding: 18px; font-size: 22px; font-weight: bold;
      border: 2px solid #e2e8f0; background: #f7fafc;
      border-radius: 12px; cursor: pointer; transition: all 0.2s;
    }
    .pin-key:active { background: #667eea; color: white; }
    .pin-delete { background: #fee2e2; color: #f56565; }
    .pin-ok { background: #48bb78; color: white; border-color: #48bb78; }
  </style>
</head>
<body>

<div class="pin-container">
  <h2>🔐 Silver's Wallet</h2>
  <p>Enter your 4-digit PIN</p>
  
  <div class="pin-display">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  
  <div class="pin-keypad" id="pinKeypad">
    <button class="pin-key" data-key="1">1</button>
    <button class="pin-key" data-key="2">2</button>
    <button class="pin-key" data-key="3">3</button>
    <button class="pin-key" data-key="4">4</button>
    <button class="pin-key" data-key="5">5</button>
    <button class="pin-key" data-key="6">6</button>
    <button class="pin-key" data-key="7">7</button>
    <button class="pin-key" data-key="8">8</button>
    <button class="pin-key" data-key="9">9</button>
    <button class="pin-key" data-key="0">0</button>
    <button class="pin-key pin-delete" data-key="del">⌫</button>
    <button class="pin-key pin-ok" data-key="ok">OK</button>
  </div>
  
  <p id="status" style="color: #a0aec0;">Click a number to test</p>
</div>

<script>
  console.log('=== SCRIPT STARTED ===');
  
  var currentPin = '';
  
  // Get dots
  var d0 = document.getElementById('d0');
  var d1 = document.getElementById('d1');
  var d2 = document.getElementById('d2');
  var d3 = document.getElementById('d3');
  
  console.log('Dots found:', d0, d1, d2, d3);
  
  function updateDots() {
    console.log('Updating dots, currentPin:', currentPin, 'length:', currentPin.length);
    
    if (currentPin.length >= 1) d0.classList.add('filled'); else d0.classList.remove('filled');
    if (currentPin.length >= 2) d1.classList.add('filled'); else d1.classList.remove('filled');
    if (currentPin.length >= 3) d2.classList.add('filled'); else d2.classList.remove('filled');
    if (currentPin.length >= 4) d3.classList.add('filled'); else d3.classList.remove('filled');
    
    document.getElementById('status').textContent = 'PIN length: ' + currentPin.length;
  }
  
  // Get keypad
  var keypad = document.getElementById('pinKeypad');
  console.log('Keypad found:', keypad);
  
  // Get all buttons
  var buttons = keypad.querySelectorAll('button');
  console.log('Buttons found:', buttons.length);
  
  // Attach click to EACH button
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      console.log('Button clicked:', this.textContent);
      
      var key = this.getAttribute('data-key');
      console.log('Key value:', key);
      
      if (key === 'del') {
        currentPin = currentPin.slice(0, -1);
      } else if (key === 'ok') {
        if (currentPin.length === 4) {
          alert('PIN entered: ' + currentPin);
          currentPin = '';
        } else {
          alert('Need 4 digits, currently: ' + currentPin.length);
        }
      } else {
        if (currentPin.length < 4) {
          currentPin = currentPin + key;
        }
      }
      
      updateDots();
    });
  }
  
  console.log('=== EVENT LISTENERS ATTACHED ===');
  console.log('Try clicking the number buttons now');
  console.log('If dots dont fill, check Console for errors');
</script>

</body>
</html>
