<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Silver's Wallet</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f7fafc; }
    
    .pin-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(135deg, #667eea, #764ba2);
      display: flex; justify-content: center; align-items: center; z-index: 1000;
    }
    .pin-container {
      background: white; border-radius: 24px; padding: 40px;
      text-align: center; width: 360px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .pin-display { display: flex; justify-content: center; gap: 20px; margin-bottom: 32px; }
    .pin-dot { width: 20px; height: 20px; border-radius: 50%; background: #e2e8f0; }
    .pin-dot.filled { background: #667eea; transform: scale(1.2); }
    .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 24px; }
    .pin-key {
      padding: 18px; font-size: 22px; font-weight: bold;
      border: 2px solid #e2e8f0; background: #f7fafc;
      border-radius: 12px; cursor: pointer;
    }
    .pin-key:active { background: #667eea; color: white; }
    .pin-delete { background: #fee2e2; color: #f56565; }
    .pin-ok { background: #48bb78; color: white; }
    .pin-reset { background: none; border: none; color: #667eea; cursor: pointer; margin-top: 16px; text-decoration: underline; }
    
    .app-container { display: flex; min-height: 100vh; }
    .main-content { flex: 1; padding: 30px; }
    .page { display: none; }
    .page.active { display: block; }
    
    .stats-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 16px; padding: 24px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .stat-label { font-size: 14px; color: #a0aec0; margin-bottom: 8px; }
    .stat-value { font-size: 32px; font-weight: bold; }
  </style>
</head>
<body>

<!-- PIN SCREEN -->
<div class="pin-screen" id="pinScreen">
  <div class="pin-container">
    <h2>🔐 Silver's Wallet</h2>
    <p id="pinMessage">Enter your 4-digit PIN</p>
    <div class="pin-display">
      <div class="pin-dot" id="dot0"></div>
      <div class="pin-dot" id="dot1"></div>
      <div class="pin-dot" id="dot2"></div>
      <div class="pin-dot" id="dot3"></div>
    </div>
    <div class="pin-keypad" id="pinKeypad">
      <button class="pin-key" data-key="1">1</button>
      <button class="pin-key" data-key="2">2</button>
      <button class="pin-key" data-key="3">3</button>
      <button class="pin-key" data-key="4">4</button>
      <button class="pin-key" data-key="5">5</button>
      <button class="pin-key" data-key="6">6</button>
      <button class="pin-key" data-key="7">7</button>
      <button class="pin-key" data-key="8">8</button>
      <button class="pin-key" data-key="9">9</button>
      <button class="pin-key" data-key="0">0</button>
      <button class="pin-key pin-delete" data-key="del">⌫</button>
      <button class="pin-key pin-ok" data-key="ok">OK</button>
    </div>
    <button class="pin-reset" id="resetPinBtn">Forgot PIN? Reset App</button>
  </div>
</div>

<!-- MAIN APP -->
<div class="app-container" id="appContainer" style="display:none;">
  <div class="main-content">
    <div id="todayPage" class="page active">
      <h1>📅 Today - <span id="todayDate"></span></h1>
      <div class="stats-cards">
        <div class="stat-card"><div class="stat-label">Income</div><div class="stat-value" id="todayIncome" style="color:#48bb78;">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">Spending</div><div class="stat-value" id="todaySpending" style="color:#f56565;">$0.00</div></div>
        <div class="stat-card"><div class="stat-label">Cash at Hand</div><div class="stat-value" id="todayBalance" style="color:#667eea;">$0.00</div></div>
      </div>
      <div id="recentTransactions"></div>
    </div>
  </div>
</div>

<script>
  console.log('=== SCRIPT STARTED ===');

  var STORAGE_KEY = 'sw_pin_test';
  var PIN_KEY = 'sw_pin_key';
  
  // Simple data store
  var savedPin = localStorage.getItem(PIN_KEY);
  console.log('Saved PIN from storage:', savedPin);
  
  var currentPin = '';
  
  // Get dots
  var dot0 = document.getElementById('dot0');
  var dot1 = document.getElementById('dot1');
  var dot2 = document.getElementById('dot2');
  var dot3 = document.getElementById('dot3');
  
  function updateDots() {
    dot0.classList.toggle('filled', currentPin.length >= 1);
    dot1.classList.toggle('filled', currentPin.length >= 2);
    dot2.classList.toggle('filled', currentPin.length >= 3);
    dot3.classList.toggle('filled', currentPin.length >= 4);
  }
  
  function handlePinKey(key) {
    console.log('Key pressed:', key, 'Current PIN length:', currentPin.length);
    
    if (key === 'del') {
      currentPin = currentPin.slice(0, -1);
    } else if (key === 'ok') {
      console.log('OK pressed. PIN length:', currentPin.length);
      
      if (currentPin.length === 4) {
        console.log('4 digits entered:', currentPin);
        
        if (!savedPin) {
          // FIRST TIME - save the PIN
          console.log('FIRST TIME SETUP - saving PIN:', currentPin);
          savedPin = currentPin;
          localStorage.setItem(PIN_KEY, currentPin);
          document.getElementById('pinMessage').textContent = 'PIN SET! Opening app...';
          setTimeout(openApp, 500);
        } else if (currentPin === savedPin) {
          // CORRECT PIN
          console.log('PIN MATCHES! Opening app...');
          document.getElementById('pinMessage').textContent = '✅ Correct! Opening...';
          setTimeout(openApp, 300);
        } else {
          // WRONG PIN
          console.log('WRONG PIN! Expected:', savedPin, 'Got:', currentPin);
          document.getElementById('pinMessage').textContent = '❌ Wrong PIN! Try again';
          currentPin = '';
        }
      } else {
        document.getElementById('pinMessage').textContent = '⚠️ Please enter 4 digits';
      }
    } else if (!isNaN(key) && currentPin.length < 4) {
      currentPin = currentPin + key;
      console.log('Added digit. PIN is now:', currentPin);
    }
    
    updateDots();
  }
  
  // Attach event listeners to each button
  var buttons = document.querySelectorAll('#pinKeypad [data-key]');
  console.log('Found', buttons.length, 'PIN buttons');
  
  for (var i = 0; i < buttons.length; i++) {
    buttons[i].addEventListener('click', function() {
      var key = this.getAttribute('data-key');
      console.log('Button clicked. Key:', key);
      handlePinKey(key);
    });
  }
  
  function openApp() {
    console.log('=== OPENING APP ===');
    document.getElementById('pinScreen').style.display = 'none';
    document.getElementById('appContainer').style.display = 'flex';
    currentPin = '';
    updateDots();
    
    // Render today
    document.getElementById('todayDate').textContent = new Date().toDateString();
    document.getElementById('todayIncome').textContent = '$0.00';
    document.getElementById('todaySpending').textContent = '$0.00';
    document.getElementById('todayBalance').textContent = '$0.00';
    document.getElementById('recentTransactions').innerHTML = '<p>Welcome to Silver\'s Wallet!</p>';
    
    console.log('=== APP OPENED SUCCESSFULLY ===');
  }
  
  // Reset button
  document.getElementById('resetPinBtn').addEventListener('click', function() {
    if (confirm('Delete PIN and all data?')) {
      localStorage.removeItem(PIN_KEY);
      savedPin = null;
      currentPin = '';
      updateDots();
      document.getElementById('pinMessage').textContent = 'App reset. Set a new PIN';
      console.log('App reset');
    }
  });
  
  // Initialize
  updateDots();
  
  if (!savedPin) {
    document.getElementById('pinMessage').textContent = 'First time? Set a new 4-digit PIN';
    console.log('No PIN set - first time setup');
  } else {
    document.getElementById('pinMessage').textContent = 'Enter your 4-digit PIN to unlock';
    console.log('PIN exists - waiting for login');
  }
  
  console.log('=== SETUP COMPLETE ===');
  console.log('Click the number buttons and press OK');
</script>

</body>
</html>
